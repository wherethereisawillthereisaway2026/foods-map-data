<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Hiragino Sans',sans-serif;height:100vh;display:flex;overflow:hidden}

#sb{width:345px;flex-shrink:0;background:#fff;border-right:1px solid #e0e0e0;display:flex;flex-direction:column;z-index:10;box-shadow:2px 0 8px rgba(0,0,0,.08);overflow:hidden;transition:width .25s}
#sb.collapsed{width:0}

#collapse-btn{position:fixed;top:50%;left:345px;transform:translateY(-50%);z-index:20;background:rgba(26,26,46,.85);color:#fff;border:none;border-radius:0 5px 5px 0;padding:10px 5px;cursor:pointer;font-size:14px;transition:left .25s;line-height:1}

#topbar{background:#1a1a2e;padding:8px;display:flex;gap:4px;align-items:center;flex-shrink:0}
#search-inp{flex:1;border:none;border-radius:5px;padding:6px 8px;font-size:12px;outline:none;min-width:0}
.tb-btn{background:rgba(255,255,255,.15);color:#fff;border:none;border-radius:5px;padding:6px 8px;font-size:13px;cursor:pointer;white-space:nowrap;flex-shrink:0}
.tb-btn:hover{background:rgba(255,255,255,.28)}

#status-bar{padding:5px 10px;font-size:12px;color:#777;border-bottom:1px solid #f0f0f0;flex-shrink:0;min-height:24px}
#budget-bar{padding:5px 10px 6px;border-bottom:1px solid #f0f0f0;flex-shrink:0;background:#fafafa}
#budget-bar .blabel{font-size:11px;color:#999;margin-bottom:3px}
#budget-bar .frow{gap:3px}

#sb-scroll{flex:1;overflow-y:auto;overflow-x:hidden}
.sec{border-bottom:2px solid #eee;padding:8px 8px 10px}
.sec-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.sec-title{font-size:13px;font-weight:700;color:#333;display:flex;align-items:center;gap:5px}
.sec-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.sec-all{font-size:11px;background:#f0f0f0;border:none;border-radius:4px;padding:2px 7px;cursor:pointer;color:#555}
.sec-all:hover{background:#ddd}

.fgrid{display:grid;grid-template-columns:repeat(5,1fr);gap:2px}
.fgrid4{display:grid;grid-template-columns:repeat(4,1fr);gap:2px}
.frow{display:flex;flex-wrap:wrap;gap:3px}
.fbtn{font-size:11px;padding:3px 4px;border:1.5px solid #ddd;border-radius:4px;cursor:pointer;background:#fff;color:#666;text-align:center;line-height:1.3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;transition:all .15s;max-width:100%}
.fbtn.on{color:#fff;border-color:transparent}
.fbtn:hover{opacity:.8}

.sec-sub{font-size:11px;color:#999;margin:5px 0 3px;font-weight:600}

#map{flex:1}
#handle{display:none}

.iw{min-width:190px;max-width:250px;font-size:13px}
.iw-src{font-size:10px;font-weight:700;padding:2px 7px;border-radius:10px;color:#fff;display:inline-block;margin-bottom:5px}
.iw-name{font-size:14px;font-weight:700;margin-bottom:6px;line-height:1.3}
.iw-row{font-size:11px;color:#555;margin-bottom:3px}
.iw-links{display:flex;gap:5px;margin-top:8px}
.iw-link{flex:1;display:block;text-align:center;padding:6px 4px;border-radius:5px;color:#fff;text-decoration:none;font-size:11px;font-weight:600}

#update-btn,#fc-update-btn{font-size:14px;background:rgba(255,255,255,.15);color:#fff;border:none;border-radius:5px;padding:4px 7px;cursor:pointer;flex-shrink:0}
#update-btn:hover,#fc-update-btn:hover{background:rgba(255,255,255,.28)}
#update-btn.confirm,#fc-update-btn.confirm{background:#e53935}
#update-btn:disabled,#fc-update-btn:disabled{opacity:.4;cursor:default}
.progress-area{padding:4px 8px 6px;border-top:1px solid #f0f0f0}
.progress-bar-wrap{background:#e0e0e0;border-radius:3px;height:4px;margin:4px 0}
.progress-bar-fill{background:#00b0a0;height:4px;border-radius:3px;transition:width .4s}
.fc-bar-fill{background:#ff6f00}
.step-list{list-style:none;font-size:10px;color:#777;margin-top:3px;padding:0}

.iw-name a{color:inherit;text-decoration:none}
.iw-name a:hover{text-decoration:underline}
.iw-memo-area{width:100%;border:1px solid #ddd;border-radius:4px;padding:5px;font-size:11px;resize:vertical;min-height:50px;margin-top:6px;font-family:inherit}
.iw-memo-save{font-size:11px;background:#1a1a2e;color:#fff;border:none;border-radius:4px;padding:4px 10px;cursor:pointer;margin-top:4px}
.iw-memo-saved{font-size:10px;color:#43a047;margin-left:6px}
.iw-memo-existing{font-size:11px;color:#555;background:#f9f9f9;border-radius:4px;padding:5px;margin-top:6px;white-space:pre-wrap;cursor:pointer}

#ml-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:9999;align-items:center;justify-content:center}
#ml-modal.open{display:flex}
#ml-box{background:#fff;border-radius:10px;padding:18px;width:320px;max-width:92vw;max-height:90vh;overflow-y:auto}
#ml-box label{font-size:10px;color:#888;display:block;margin:8px 0 2px}
#ml-box input,#ml-box select,#ml-box textarea{width:100%;border:1px solid #ddd;border-radius:5px;padding:6px 8px;font-size:13px;font-family:inherit;box-sizing:border-box}
#ml-box textarea{resize:vertical;min-height:56px}
.ml-row{display:flex;gap:4px}
.ml-row input{flex:1}
#ml-geo-status{font-size:10px;color:#888;min-height:14px;margin-top:2px}
.ml-btns{display:flex;gap:8px;margin-top:14px}
.ml-btn{flex:1;border:none;border-radius:6px;padding:8px;font-size:12px;font-weight:700;cursor:pointer}
.ml-btn.primary{background:#1565c0;color:#fff}
.ml-btn.cancel{background:#f0f0f0;color:#555}
#mylist-items{margin-top:6px}
.ml-item{padding:5px 4px;border-bottom:1px solid #f5f5f5;font-size:12px;display:flex;justify-content:space-between;align-items:center;cursor:pointer}
.ml-item-name{font-weight:600;color:#1a1a1a;flex:1}
.ml-item-del{font-size:11px;color:#e53935;background:none;border:none;cursor:pointer;padding:2px 4px;flex-shrink:0}

@keyframes spin{to{transform:rotate(360deg)}}

@media(max-width:600px){
  body{display:block}
  #map{position:fixed;inset:0;width:100%;height:100%}
  #sb{position:fixed;bottom:0;left:0;right:0;width:100%!important;height:40vh;border-right:none;border-radius:12px 12px 0 0;box-shadow:0 -3px 16px rgba(0,0,0,.15);z-index:1000;transition:height .3s}
  #sb.sh-collapsed{height:50px}
  #sb.sh-full{height:calc(100vh - 20px)}
  #handle{display:flex!important;justify-content:center;padding:9px 0 5px;cursor:pointer;flex-shrink:0;touch-action:none}
  #handle::before{content:'';width:36px;height:4px;background:#ccc;border-radius:2px;display:block}
  #collapse-btn{display:none!important}
}
</style>

function getLocalChanges(){try{return JSON.parse(localStorage.getItem('foods_mylist_changes')||'{}');}catch(e){return {};}}
function saveLocalChanges(c){try{localStorage.setItem('foods_mylist_changes',JSON.stringify(c));}catch(e){}}
function loadMemo(){try{memoData=JSON.parse(localStorage.getItem('foods_memo')||'{}');}catch(e){memoData={};}}

function loadMylistData(cb){
  var c=getLocalChanges();
  var localAdded=c.added||[];
  var localEdited=c.edited||{};
  var localDeleted=new Set(c.deleted||[]);
  function applyEdited(m){var ov=localEdited[m.id];return ov?Object.assign({},m,ov):m;}
  fetch(MYLIST_CDN+'?t='+Date.now())
    .then(function(r){return r.json();})
    .then(function(data){
      mylistData=data
        .filter(function(m){return !localDeleted.has(m.id);})
        .map(applyEdited);
      localAdded.forEach(function(m){if(!localDeleted.has(m.id))mylistData.push(applyEdited(m));});
      cb();
    })
    .catch(function(){
      mylistData=localAdded
        .filter(function(m){return !localDeleted.has(m.id);})
        .map(applyEdited);
      cb();
    });
}

function _matchBgtSet(stateKey, ranges, val){
  var set=fState[stateKey];
  if(set.size===0)return true;
  var matched=false;
  set.forEach(function(key){
    var r=ranges.find(function(x){return x.key===key;});
    if(!r)return;
    if(r.min===0&&r.max===0){if(val===0)matched=true;}
    else if(val>=r.min&&val<=r.max)matched=true;
  });
  return matched;
}
function passBudgetFilter(item){
  var bgt_d=item.bgt_d||0, bgt_l=item.bgt_l||0;
  return _matchBgtSet('budgets_d',BUDGET_RANGES_D,bgt_d) && _matchBgtSet('budgets_l',BUDGET_RANGES_L,bgt_l);
}
function normalizeDupCoords(){
  var THRESH=0.001;
  allData.forEach(function(item){
    if(!item.dup||item.dup.length<2)return;
    var best=item,bp=SRC_PRIORITY[item.src]||9;
    allData.forEach(function(d){
      if(d.src===item.src||item.dup.indexOf(d.src)===-1)return;
      if(Math.abs(d.lat-item.lat)>THRESH||Math.abs(d.lng-item.lng)>THRESH)return;
      var dp=SRC_PRIORITY[d.src]||9;
      if(dp<bp){bp=dp;best=d;}
    });
    if(best!==item){item.lat=best.lat;item.lng=best.lng;}
  });
}
function rebuildDataIndex(){
  normalizeDupCoords();
  _dataIndex.clear();
  for(var i=0;i<allData.length;i++){var item=allData[i];if(item.lat&&item.lng)_dataIndex.set(getKey(item),item);}
  _filterDirty=true;
}
function invalidateFilter(){_filterDirty=true;}
function updateFilterCache(){
  if(!_filterDirty)return;
  _filterSet.clear();
  _dataIndex.forEach(function(item,key){if(shouldDisplay(item))_filterSet.add(key);});
  _filterDirty=false;
}
function shouldDisplay(item){
  if(item.src==='tabelog'){
    var _tabeAward=item.award==='喫茶店'?'カフェ':item.award;
    if(fState.tabe.size===0||!fState.tabe.has(_tabeAward))return false;
    if(fState.tabe_min_score>0){var s=parseFloat(item.score);if(isNaN(s)||s<fState.tabe_min_score)return false;}
    return passBudgetFilter(item);
  }
  if(item.src==='goeimillau') return fState.goei.size>0 && fState.goei.has(item.genre) && passBudgetFilter(item);
  if(item.src==='michelin'){if(fState.mich_awards.size===0)return false;if(!fState.mich_awards.has(item.award))return false;if(fState.mich_budgets.size>0&&!fState.mich_budgets.has(item.bgt_d||0))return false;return passBudgetFilter(item);}
  if(item.src==='moppy') return moppyPinVisible && passBudgetFilter(item);
  if(item.src==='fancrew') return fancrewPinVisible && passBudgetFilter(item);
  if(item.src==='msr') return msrPinVisible && passBudgetFilter(item);
  if(item.src==='mylist') return isMaster && mylistPinVisible;
  return false;
}

function isSourceActive(src){
  if(src==='tabelog')return fState.tabe.size>0;

  if(!item.dup||item.dup.length<2)return null;

}

function renderMarkers(){
  if(!dataLoaded)return;
  if(map.getZoom()<SHOW_ZOOM){markerPool.forEach(function(m){m.setMap(null);});setStatus('ズームイン（レベル'+SHOW_ZOOM+'以上）でピン表示');return;}
  var bounds=map.getBounds();if(!bounds)return;
  updateFilterCache();  // フィルタ変更時のみ全件スキャン
  var shouldShow=new Set();
  _filterSet.forEach(function(key){
    var item=_dataIndex.get(key);
    if(item&&bounds.contains({lat:item.lat,lng:item.lng}))shouldShow.add(key);
  });
  markerPool.forEach(function(m,key){if(shouldShow.has(key)){if(!m.getMap())m.setMap(map);}else{if(m.getMap())m.setMap(null);}});
  shouldShow.forEach(function(key){
    var item=_dataIndex.get(key);if(!item)return;
    if(!markerPool.has(key)){createMarker(item);}
    else if(item.dup&&item.dup.length>1){
      var ef=getEffectiveDup(item);
      var newIcon;
      if(ef){newIcon=makeDupSvg(ef);}
      else{var color=SRC_COLOR[item.src]||'#999',scale=(item.src==='michelin'&&item.award==='ミシュラン 三つ星')?11:(item.src==='michelin'&&item.award==='ミシュラン 二つ星')?10:8;newIcon={path:google.maps.SymbolPath.CIRCLE,fillColor:color,fillOpacity:1,strokeColor:'#fff',strokeWeight:2,scale:scale};}
      markerPool.get(key).setIcon(newIcon);
    }
  });
  var vis=0;markerPool.forEach(function(m){if(m.getMap())vis++;});
  setStatus(vis+'件表示中 / 全'+allData.length+'件');
}

var SRC_PRIORITY={michelin:0,goeimillau:1,tabelog:2,moppy:3,fancrew:4,msr:5};
function makeDupSvg(srcs){
  var sorted=srcs.slice().sort(function(a,b){return(SRC_PRIORITY[a]||9)-(SRC_PRIORITY[b]||9);});
  var n=sorted.length,radii=n===3?[15,10,5]:[13,7],size=radii[0]*2,cx=radii[0];
  var svg='<svg xmlns="http://www.w3.org/2000/svg" width="'+size+'" height="'+size+'">';
  sorted.forEach(function(src,i){
    svg+='<circle cx="'+cx+'" cy="'+cx+'" r="'+radii[i]+'" fill="'+(SRC_COLOR[src]||'#999')+'"/>';
    if(i<n-1)svg+='<circle cx="'+cx+'" cy="'+cx+'" r="'+radii[i]+'" fill="none" stroke="#fff" stroke-width="1.5"/>';
  });
  return{url:'data:image/svg+xml,'+encodeURIComponent(svg+'</svg>'),scaledSize:new google.maps.Size(size,size),anchor:new google.maps.Point(cx,cx)};
}

function createMarker(item){

function saveMylistItem(){
  var name=document.getElementById('ml-name').value.trim();
  if(!name){document.getElementById('ml-name').focus();return;}
  var memo=document.getElementById('ml-memo').value.trim();
  var tag=document.getElementById('ml-tag').value.trim();
  var tabelogUrl=document.getElementById('ml-tabelog-url').value.trim();
  var gmapUrl=document.getElementById('ml-gmap-url').value.trim();
  var c=getLocalChanges();

  if(_editingId){
    // 編集モード
    var item=mylistData.find(function(m){return m.id===_editingId;});
    var editData={name:name,memo:memo,tag:tag,tabelogUrl:tabelogUrl,gmapUrl:gmapUrl};
    if(_mlLat){editData.lat=_mlLat;editData.lng=_mlLng;}
    if(item){Object.assign(item,editData);}
    c.edited=c.edited||{};
    c.edited[_editingId]=Object.assign(c.edited[_editingId]||{},editData);
    saveLocalChanges(c);
    mlGasPost({action:'editMylist',id:_editingId,name:name,memo:memo,tag:tag,lat:_mlLat||'',lng:_mlLng||''});
    var mk=markerPool.get('mylist|'+_editingId);if(mk)mk._item=item;
    renderMylistItems();closeMylistModal();
    return;
  }

  // 追加モード
  if(!_mlLat||!_mlLng){document.getElementById('ml-geo-status').textContent='住所を検索してください';return;}
  var id='ml_'+Date.now();
  var item={src:'mylist',id:id,name:name,memo:memo,tag:tag,tabelogUrl:tabelogUrl,gmapUrl:gmapUrl,url:'',pid:'',award:'',score:'',sbgt:'',area:'',lat:_mlLat,lng:_mlLng,bgt_d:0,bgt_l:0};
  c.added=c.added||[];
  c.added.push(item);
  saveLocalChanges(c);
  mylistData.push(item);
  allData.push(item);
  mlGasPost({action:'addMylist',id:id,name:name,memo:memo,tag:tag,lat:_mlLat,lng:_mlLng,url:''});
  renderMylistItems();rebuildDataIndex();renderMarkers();
  closeMylistModal();
}
var _mlDelTimer=null;
var _mlDelPending=null;
function confirmDeleteMylist(id,btn){
  if(_mlDelPending===id){
    clearTimeout(_mlDelTimer);_mlDelTimer=null;_mlDelPending=null;
    deleteMylistItem(id);
    return;
  }
  if(_mlDelPending&&_mlDelPending!==id){
    var prev=document.getElementById('ml-del-'+_mlDelPending);
    if(prev){prev.textContent='削除';prev.style.opacity='';}
    clearTimeout(_mlDelTimer);
  }
  _mlDelPending=id;
  if(btn){btn.textContent='確認？';btn.style.opacity='0.75';}
  _mlDelTimer=setTimeout(function(){
    _mlDelPending=null;_mlDelTimer=null;
    if(btn){btn.textContent='削除';btn.style.opacity='';}
  },4000);
}
function deleteMylistItem(id){
  var c=getLocalChanges();
  c.deleted=c.deleted||[];
  if(c.deleted.indexOf(id)===-1)c.deleted.push(id);
  c.added=(c.added||[]).filter(function(m){return m.id!==id;});
  if(c.edited)delete c.edited[id];
  saveLocalChanges(c);
  mylistData=mylistData.filter(function(m){return m.id!==id;});
  allData=allData.filter(function(d){return!(d.src==='mylist'&&d.id===id);});
  var key='mylist|'+id;
  var m=markerPool.get(key);if(m)m.setMap(null);markerPool.delete(key);
  mlGasPost({action:'deleteMylist',id:id});
  renderMylistItems();rebuildDataIndex();
}

function geocodeAllMylist(){
  var pending=mylistData.filter(function(m){return !m.lat||!m.lng;});
  if(!pending.length){setStatus('全件ジオコード済み');return;}
  var geocoder=new google.maps.Geocoder();
  var done=0,miss=0,total=pending.length;
  setStatus('ジオコード開始: '+total+'件');
  function next(i){
    if(i>=total){
      // 結果をlocalChangesに保存
      var c=getLocalChanges();c.edited=c.edited||{};
      mylistData.forEach(function(m){if(m.lat&&m.lng){var ex=c.edited[m.id]||{};c.edited[m.id]=Object.assign(ex,{lat:m.lat,lng:m.lng,pid:m.pid||''});}});
      saveLocalChanges(c);
      setStatus('ジオコード完了: OK='+done+' MISS='+miss+'/'+total+' — JSONをダウンロードしてcommitしてください');
      renderMylistItems();rebuildDataIndex();renderMarkers();
      return;
    }
    var item=pending[i];
    geocoder.geocode({address:item.name,region:'JP'},function(res,st){
      if(st==='OK'&&res[0]){
        var loc=res[0].geometry.location;
        item.lat=loc.lat();item.lng=loc.lng();item.pid=res[0].place_id||'';done++;
      }else{miss++;}
      setStatus('ジオコード中: '+(i+1)+'/'+total+' (OK='+done+' MISS='+miss+')');
      setTimeout(function(){next(i+1);},300);
    });
  }
  next(0);
}

function mergeData(foodsArr){
  var result=foodsArr.slice();
  var entry=moppyData&&moppyData['all'];
  if(entry&&entry.stores){
    var updated=entry.updated?new Date(entry.updated).toLocaleDateString('ja-JP'):'';
    var cnt=0;
    entry.stores.forEach(function(s){
      if(!s.lat||!s.lng||!isFinite(s.lat)||!isFinite(s.lng))return;
      result.push({src:'moppy',name:s.name,lat:s.lat,lng:s.lng,url:s.url,award:s.reward||'',genre:'',bgt_d:0,bgt_l:0,sbgt:s.budget||'',pid:'',area:s.address||''});
      cnt++;
    });
    document.getElementById('moppy-count').textContent=cnt+'件'+(updated?'（'+updated+'）':'');
  }
  var fcEntry=fancrewData;
  if(fcEntry&&fcEntry.stores){
    var fcUpdated=fcEntry.updated?new Date(fcEntry.updated).toLocaleDateString('ja-JP'):'';
    var fcCnt=0;
    fcEntry.stores.forEach(function(s){
      if(!s.lat||!s.lng||!isFinite(s.lat)||!isFinite(s.lng))return;
      result.push({src:'fancrew',name:s.name,lat:s.lat,lng:s.lng,url:s.url,award:s.reward||'',genre:'',bgt_d:0,bgt_l:0,sbgt:s.budget||'',pid:'',area:s.address||''});
      fcCnt++;
    });
    document.getElementById('fancrew-count').textContent=fcCnt+'件'+(fcUpdated?'（'+fcUpdated+'）':'');
  }
  var msrEntry=msrData;
  if(msrEntry&&msrEntry.stores){
    var msrUpdated=msrEntry.updated?new Date(msrEntry.updated).toLocaleDateString('ja-JP'):'';
    var msrCnt=0;
    msrEntry.stores.forEach(function(s){
      if(!s.lat||!s.lng||!isFinite(s.lat)||!isFinite(s.lng))return;
      result.push({src:'msr',name:s.name,lat:s.lat,lng:s.lng,url:s.url,award:s.reward||'',genre:'',bgt_d:0,bgt_l:0,sbgt:'',pid:'',area:s.address||''});
      msrCnt++;
    });
    document.getElementById('msr-count').textContent=msrCnt+'件'+(msrUpdated?'（'+msrUpdated+'）':'');
  }
  mylistData.forEach(function(m){if(m.lat&&m.lng)result.push(Object.assign({src:'mylist',award:'',score:'',sbgt:'',area:'',bgt_d:0,bgt_l:0,pid:''},m));});
  return result;
}

function initMap(){
  var _pos=(function(){try{return JSON.parse(localStorage.getItem('foods_pos')||'null');}catch(e){return null;}})();
  map=new google.maps.Map(document.getElementById('map'),{
    center:_pos?{lat:_pos.lat,lng:_pos.lng}:{lat:35.68,lng:139.69},
    zoom:_pos?_pos.z:11,

  });

  map.addListener('idle',function(){
    var c=map.getCenter();

    renderMarkers();
  });
  map.addListener('click',function(e){

      var svc=new google.maps.places.PlacesService(map);
      svc.getDetails({placeId:e.placeId,fields:['name','place_id','geometry','formatted_address']},function(place,status){

        var gmUrl=pid?'https://www.google.com/maps/place/?q=place_id:'+pid:'https://maps.google.com/?q='+loc.lat()+','+loc.lng();
        window._mlInfoPrefill={name:place.name||'',lat:loc.lat(),lng:loc.lng(),pid:pid};

          +'<div class="iw-name"><a href="'+esc(gmUrl)+'" target="_blank" rel="noopener">'+esc(place.name||'')+'</a></div>'
          +(place.formatted_address?'<div class="iw-row" style="font-size:11px;color:#888">'+esc(place.formatted_address)+'</div>':'')
          +'<div class="iw-links">'
          +'<a class="iw-link" style="background:#1565c0" href="#" onclick="openMylistModal(window._mlInfoPrefill);return false">＋ リスト</a>'
          +'</div></div>';
        var tmp=new google.maps.Marker({position:loc,map:map,icon:{path:google.maps.SymbolPath.CIRCLE,fillColor:'#1565c0',fillOpacity:1,strokeColor:'#fff',strokeWeight:2,scale:8}});
        infoWin.setContent(html);infoWin.open(map,tmp);
        infoWin.addListener('closeclick',function(){tmp.setMap(null);});
      });
    }else{
      infoWin.close();
    }
  });
  try{localStorage.removeItem('foods_f');}catch(e){}
  if(!isMaster){var ms=document.getElementById('mylist-sec');if(ms)ms.style.display='none';}
  loadMemo();loadGmapLinks();buildFilters();renderMylistItems();
  if(isMaster){
    var gb=document.getElementById('ml-geocode-btn'),eb=document.getElementById('ml-export-btn');
    if(gb)gb.style.display='';if(eb)eb.style.display='';
  }
  loadMsrData(function(){loadFancrewData(function(){loadMoppyData(function(){loadMylistData(function(){loadFoodsData();});});});});
  document.getElementById('locate-btn').addEventListener('click',function(){
    if(!navigator.geolocation)return;
    navigator.geolocation.getCurrentPosition(function(pos){map.setCenter({lat:pos.coords.latitude,lng:pos.coords.longitude});map.setZoom(14);});
  });

function doSearch(){
  var kw=document.getElementById('search-inp').value.trim();if(!kw)return;
  var kl=kw.toLowerCase().replace(/\s+/g,'');
  var found=allData.filter(function(d){return d.name&&d.name.toLowerCase().replace(/\s+/g,'').indexOf(kl)!==-1&&d.lat&&d.lng;});
  if(found.length>0){
    var item=found[0];
    map.setCenter({lat:item.lat,lng:item.lng});
    map.setZoom(16);
    var tmp=new google.maps.Marker({position:{lat:item.lat,lng:item.lng},map:map,icon:{path:google.maps.SymbolPath.CIRCLE,fillColor:SRC_COLOR[item.src]||'#1565c0',fillOpacity:1,strokeColor:'#fff',strokeWeight:2,scale:10}});
    showInfo(item,tmp);
    infoWin.addListener('closeclick',function(){tmp.setMap(null);});
    if(found.length>1)setStatus(found.length+'件ヒット: '+found.map(function(d){return d.name;}).slice(0,5).join(' / '));
    return;
  }
  new google.maps.Geocoder().geocode({address:kw,region:'JP'},function(res,st){
    if(st!=='OK'||!res[0])return;
    var r=res[0],loc=r.geometry.location,pid=r.place_id,addr=r.formatted_address;
    map.fitBounds(r.geometry.viewport);
    var tmp=new google.maps.Marker({position:loc,map:map,icon:{path:google.maps.SymbolPath.CIRCLE,fillColor:'#555',fillOpacity:1,strokeColor:'#fff',strokeWeight:2,scale:10}});
    var gmUrl=(pid&&pid.indexOf('ChIJ')===0)?'https://www.google.com/maps/place/?q=place_id:'+pid:'https://maps.google.com/?q='+loc.lat()+','+loc.lng();
    var _geo={name:kw,address:addr,lat:loc.lat(),lng:loc.lng()};
    var html='<div class="iw"><div class="iw-name">'+esc(kw)+'</div><div class="iw-row">📍 '+esc(addr)+'</div>'
      +'<div class="iw-links">'
      +(isMaster?'<a class="iw-link" style="background:#1565c0" href="#" onclick="openMylistModal(window._lastGeo);return false">＋ マイリスト</a>':'')
      +'<a class="iw-link" style="background:#555" href="'+esc(gmUrl)+'" target="_blank" rel="noopener">Googleマップ</a>'
      +'</div></div>';
    window._lastGeo=_geo;
    infoWin.setContent(html);infoWin.open(map,tmp);
    infoWin.addListener('closeclick',function(){tmp.setMap(null);});
  });
}

// ===== MOBILE SHEET =====
(function(){
  var sb=document.getElementById('sb'),handle=document.getElementById('handle');
  var state='half',startY=0,hasMoved=false;
  function cls(c){sb.className=sb.className.replace(/\s*sh-\S+/g,'')+(c?' '+c:'');}
  handle.addEventListener('touchstart',function(e){startY=e.touches[0].clientY;hasMoved=false;},{passive:true});
  handle.addEventListener('touchmove',function(){hasMoved=true;},{passive:true});
  handle.addEventListener('touchend',function(e){
    var dy=e.changedTouches[0].clientY-startY;
    if(!hasMoved||Math.abs(dy)<40){if(state==='sh-collapsed'){state='half';cls('');}else{state='sh-collapsed';cls('sh-collapsed');}}
    else if(dy<0){if(state==='sh-collapsed'){state='half';cls('');}else{state='sh-full';cls('sh-full');}}
    else{if(state==='sh-full'){state='half';cls('');}else{state='sh-collapsed';cls('sh-collapsed');}}
    hasMoved=false;
  });
})();

// ===== MOPPY UPDATE =====
var FC_STEP_NAMES=['Set up job','Run actions/checkout@v4','Setup Python','Install dependencies','Run scraper','Commit fancrew-data.json'];
var _fcConfPending=false,_fcConfTimer=null,fcPollTimer=null,fcCurrentRunId=null;
function handleFancrewUpdateClick(btn){
  if(btn.disabled)return;
  if(_fcConfPending){clearTimeout(_fcConfTimer);_fcConfPending=false;btn.classList.remove('confirm');triggerFancrewScrape();}
  else{_fcConfPending=true;btn.classList.add('confirm');btn.title='もう1回で実行';_fcConfTimer=setTimeout(function(){_fcConfPending=false;btn.classList.remove('confirm');btn.title='';},4000);}
}
function triggerFancrewScrape(){
  var btn=document.getElementById('fc-update-btn');btn.disabled=true;
  fetch('https://api.github.com/repos/'+FANCREW_GH_REPO+'/actions/workflows/fancrew-scrape.yml/dispatches',{method:'POST',headers:{'Authorization':'Bearer '+GH_TOKEN,'Accept':'application/vnd.github+json','Content-Type':'application/json'},body:JSON.stringify({ref:'main'})})
    .then(function(r){if(r.status===204)startFancrewProgress();else{btn.disabled=false;setStatus('トリガー失敗('+r.status+')');} })
    .catch(function(){btn.disabled=false;setStatus('通信エラー');});
}
function startFancrewProgress(){
  document.getElementById('fc-progress-wrap').style.display='block';
  document.getElementById('fc-progress-bar').style.width='0%';
  var startTime=Date.now(),attempts=0;fcCurrentRunId=null;
  var ft=setInterval(function(){
    attempts++;
    fetch('https://api.github.com/repos/'+FANCREW_GH_REPO+'/actions/runs?event=workflow_dispatch&per_page=5',{headers:{'Authorization':'Bearer '+GH_TOKEN,'Accept':'application/vnd.github+json'}})
      .then(function(r){return r.json();}).then(function(d){
        var runs=d.workflow_runs||[];
        for(var i=0;i<runs.length;i++){if(new Date(runs[i].created_at).getTime()>=startTime-8000){fcCurrentRunId=runs[i].id;clearInterval(ft);fcPollTimer=setInterval(pollFancrewSteps,8000);pollFancrewSteps();return;}}
        if(attempts>6)clearInterval(ft);
      }).catch(function(){});
  },5000);
}
function pollFancrewSteps(){
  if(!fcCurrentRunId)return;
  fetch('https://api.github.com/repos/'+FANCREW_GH_REPO+'/actions/runs/'+fcCurrentRunId+'/jobs',{headers:{'Authorization':'Bearer '+GH_TOKEN,'Accept':'application/vnd.github+json'}})
    .then(function(r){return r.json();}).then(function(d){
      var job=(d.jobs||[])[0];if(!job)return;
      var steps=(job.steps||[]).filter(function(s){return FC_STEP_NAMES.indexOf(s.name)!==-1;});
      var done=steps.filter(function(s){return s.status==='completed';}).length;
      document.getElementById('fc-progress-bar').style.width=Math.round(done/FC_STEP_NAMES.length*100)+'%';
      var ul=document.getElementById('fc-step-list');ul.innerHTML='';
      steps.forEach(function(s){var li=document.createElement('li');li.textContent=(s.status==='completed'?'✓ ':s.status==='in_progress'?'⟳ ':'· ')+s.name;ul.appendChild(li);});
      if(job.status==='completed'){
        clearInterval(fcPollTimer);
        document.getElementById('fc-progress-wrap').style.display='none';
        document.getElementById('fc-update-btn').disabled=false;
        if(job.conclusion==='success'){setStatus('Fancrew更新完了 — 3秒後に再読み込み');setTimeout(function(){location.reload();},3000);}
        else{loadFancrewData(function(){allData=mergeData(allData.filter(function(d){return d.src!=='fancrew';}));rebuildDataIndex();renderMarkers();});setStatus('Fancrew更新失敗');}
      }
    }).catch(function(){});
}
var STEP_NAMES=['Set up job','Run actions/checkout@v4','Checkout GAS project','Checkout foods-map-data','Setup Python','Install dependencies','Setup clasp','Run scraper','Commit GAS data','Commit moppy-data.json to foods-map-data','Deploy to GAS'];

      if(job.status==='completed'){
